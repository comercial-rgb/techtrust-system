# Critical path: splash → landing → menu → login screen (Android package).
# Prereq: Maestro CLI (https://maestro.mobile.dev), app installed (release or dev client).
# iOS: copy to a local override or run `maestro test maestro/critical-login-from-landing.ios.yaml`
appId: com.techtrustauto.mobile
---
- launchApp
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "landing-menu-button"
    timeout: 120000
- tapOn:
    id: "landing-menu-button"
- extendedWaitUntil:
    visible:
      id: "landing-menu-login-button"
    timeout: 20000
- tapOn:
    id: "landing-menu-login-button"
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 20000
- assertVisible:
    id: "login-email-input"
- assertVisible:
    id: "login-password-input"
